<h1 id="why-the-banana-pi-openwrt-one-for-ham-radio">Why the Banana Pi OpenWRT-One for Ham Radio?</h1>
<h3 id="it-was-designed-to-run-openwrt--not-hacked-into-it">It was <em>designed</em> to run OpenWrt — not hacked into it</h3>
<ul>
<li><strong>Official OpenWrt board</strong> — mainline kernel support, no patches needed</li>
<li><strong>Dual storage = unbrickable</strong> — 16 MiB NOR holds a rescue firmware</li>
<li><strong>mikroBUS expansion</strong> — add SPI/I²C/UART radios, GPS, or peripherals</li>
<li><strong>M.2 slot</strong> — add NVMe SSD for logging, audio recordings, databases</li>
<li><strong>USB 2.0</strong> — USB audio interface for radio TX/RX audio</li>
<li><strong>Low power</strong> — runs on PoE, great for remote installs</li>
<li><strong>OpenWrt = full Linux</strong> — <code>opkg install</code> anything you need</li>
</ul>
<h3 id="ham-use-cases-on-this-board">Ham use cases on this board</h3>
<ul>
<li>44Net gateway (WireGuard or IPIP tunnel)</li>
<li>SVXLink EchoLink node</li>
<li>APRS iGate / digipeater</li>
<li>Winlink gateway (with USB TNC)</li>
<li>AREDN node controller</li>
</ul>
</section>

<h1 id="44net--amprnet">44Net / AMPRNet</h1>
<h3 id="what-is-it">What is it?</h3>
<p><strong>AMPRNet</strong> = Amateur Packet Radio Network<br />
<strong>44Net</strong> = the <code>44.0.0.0/8</code> IP block</p>
<ul>
<li>Allocated in <strong>1981</strong> — one of the earliest registered /8 blocks</li>
<li>Managed by <strong>ARDC</strong> (Amateur Radio Digital Communications)</li>
<li>Only licensed amateur radio operators may request addresses</li>
<li>IPs are <strong>globally routable</strong> — reachable from the public internet</li>
<li>Free to use — no cost for the address space</li>
</ul>
</section>

<h1 id="how-44net-connectivity-works">How 44Net Connectivity Works</h1>
<h3 id="option-1-ipip-tunnel-mesh-classic">Option 1: IPIP Tunnel Mesh (classic)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>[Your 44.x.x.x host]
      │  IPIP encapsulation over your ISP connection
      ▼
[UCSD tunnel router — ampr.org]
      │  routes 44.x.x.x traffic globally
      ▼
[Other 44Net nodes worldwide]
</code></pre>
<ul>
<li>Your ISP sees encrypted-looking IP-in-IP packets</li>
<li>The 44.x.x.x address is your <em>inner</em> routable address</li>
<li>Requires a static or semi-static public IP on your gateway</li>
</ul>
</section>

<h1 id="registering-for-44net--step-by-step-cont">Registering for 44Net — Step by Step (cont.)</h1>
<h3 id="step-3--request-address-space">Step 3 — Request address space</h3>
<p>Portal → <strong>Request address space</strong></p>
<ul>
<li>Choose your <strong>region/state</strong></li>
<li>Choose type: <strong>&quot;End User&quot;</strong> (for a single node or small subnet)</li>
<li>Request a <strong>/29</strong> (6 usable addresses) or <strong>/30</strong> (2 usable) for starters</li>
<li>Describe your use case: <em>&quot;EchoLink node + experimental networking&quot;</em></li>
</ul>
</section>

<h1 id="registering-for-44net--step-by-step-cont-1">Registering for 44Net — Step by Step (cont.)</h1>
<h3 id="step-4--register-your-gateway">Step 4 — Register your gateway</h3>
<p>Once approved, portal → <strong>Gateways</strong> → Add Gateway</p>
<ul>
<li>Enter your gateway's <strong>public IP address</strong></li>
<li>Enter your <strong>44.x.x.x</strong> subnet</li>
</ul>
<h3 id="step-5--add-dns-records">Step 5 — Add DNS records</h3>
<p>Portal → <strong>DNS</strong> → add an <code>A</code> record for each host</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>mynode.k0abc.ampr.org  →  44.x.x.x
</code></pre>
<blockquote>
<p><strong>The UCSD tunnel router will not route to you without a DNS entry.</strong></p>
</blockquote>

<h1 id="44net-connect--the-easy-path-20252026">44Net Connect — The Easy Path (2025/2026)</h1>
<h3 id="if-you-just-want-a-44net-ip-with-minimal-setup">If you just want a 44Net IP with minimal setup</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Install WireGuard</span>
<span class="hljs-built_in">sudo</span> apt install wireguard

<span class="hljs-comment"># Get your config from https://connect.44net.cloud/</span>
<span class="hljs-comment"># (requires portal.ampr.org account first)</span>

<span class="hljs-comment"># Save config as /etc/wireguard/44net.conf</span>
<span class="hljs-comment"># Then:</span>
<span class="hljs-built_in">sudo</span> wg-quick up 44net

<span class="hljs-comment"># Verify your 44 address</span>
ip addr show 44net
</code></pre>

<h1 id="echolink--voice-over-ip-for-licensed-hams">EchoLink — Voice Over IP for Licensed Hams</h1>
<h3 id="what-is-echolink">What is EchoLink?</h3>
<ul>
<li>Created by <strong>Jonathan Taylor, K1RFD</strong> in 2002</li>
<li>Connects licensed amateur radio operators via <strong>VoIP</strong></li>
<li>Over <strong>250,000 validated users</strong> worldwide</li>
<li>Three node types:</li>
</ul>
<table>
<thead>
<tr>
<th>Type</th>
<th>Description</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Simplex (L)</strong></td>
<td>PC with mic/speaker, no radio</td>
</tr>
<tr>
<td><strong>Single (-)</strong></td>
<td>PC linked to a simplex radio</td>
</tr>
<tr>
<td><strong>Repeater (R)</strong></td>
<td>PC linked to a repeater</td>
</tr>
</tbody>
</table>
<h3 id="key-facts">Key facts</h3>
<ul>
<li><strong>Free</strong> — no subscription</li>
<li>Requires <strong>FCC license validation</strong> before use</li>
<li>Uses <strong>GSM codec</strong> for audio compression</li>
<li>Ports: UDP 5198, UDP 5199, TCP 5200</li>
</ul>
</section>

<h1 id="echolink-network-architecture">EchoLink Network Architecture</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>[EchoLink Client — your phone/laptop]
         │  UDP 5198/5199
         ▼
[EchoLink Directory Servers]
         │  validates callsign, routes connection
         ▼
[SVXLink Node on Banana Pi — K0ABC-L]
         │  USB audio + PTT
         ▼
[Your radio TX/RX]
         │  RF — 147.940 MHz
         ▼
[K0USA Repeater .94]
         │  RF rebroadcast
         ▼
[NET participants on 147.940 MHz]
</code></pre>
</section>

<h1 id="the-k0usa-94-repeater-1">The K0USA .94 Repeater</h1>
<h3 id="the-net-concept">The NET concept</h3>
<p>A <strong>NET</strong> is a scheduled on-air meeting:</p>
<ul>
<li>Held at a regular time on a repeater frequency</li>
<li>A <strong>Net Control Station (NCS)</strong> runs the check-in list</li>
<li>Participants check in, pass traffic, or just say hello</li>
<li>EchoLink lets remote operators <strong>check in from anywhere</strong></li>
</ul>
<blockquote>
<p><strong>Your goal:</strong> run an EchoLink-linked node so anyone connecting to your EchoLink node number can participate in the K0USA NET.</p>
</blockquote>
</section>

<h1 id="svxlink--the-engine">SVXLink — The Engine</h1>
<h3 id="why-svxlink-not-the-windows-echolink-app">Why SVXLink, not the Windows EchoLink app?</h3>
<ul>
<li><strong>Native Linux</strong> — runs headless, no GUI needed</li>
<li><strong>Full repeater controller</strong> — CTCSS, hang time, IDs, courtesy tones</li>
<li><strong>Modular</strong> — EchoLink is just one module</li>
<li><strong>Rock solid</strong> — runs for months unattended</li>
<li><strong>Open source</strong> — <code>github.com/sm0svx/svxlink</code></li>
<li><strong>Packaged</strong> — available in Debian, Ubuntu, Raspberry Pi OS</li>
</ul>
</section>

<h1 id="linux-step-by-step-install-svxlink">Linux Step-by-Step: Install SVXLink</h1>
<h3 id="tested-on-debian-12-ubuntu-2404-raspberry-pi-os">Tested on: Debian 12, Ubuntu 24.04, Raspberry Pi OS</h3>
<h3 id="step-1--update-and-install">Step 1 — Update and install</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">sudo</span> apt update &amp;&amp; <span class="hljs-built_in">sudo</span> apt upgrade -y

<span class="hljs-built_in">sudo</span> apt install -y svxlink-server qtel \
    alsa-utils libsox-fmt-all \
    tcpdump curl git
</code></pre>
<h3 id="step-2--identify-your-usb-audio-device">Step 2 — Identify your USB audio device</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># List capture devices (radio audio IN to PC)</span>
arecord -l

<span class="hljs-comment"># List playback devices (PC audio OUT to radio)  </span>
aplay -l

<span class="hljs-comment"># Example output:</span>
<span class="hljs-comment"># card 1: Device [USB Audio Device], device 0: USB Audio [USB Audio]</span>
</code></pre>
<blockquote>
<p>Note the <strong>card number</strong> — you'll need it (e.g., <code>plughw:1,0</code>)</p>
</blockquote>

<h3 id="step-3--set-audio-levels-with-alsamixer">Step 3 — Set audio levels with alsamixer</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Open mixer for your USB audio card (replace 1 with your card number)</span>

</ul>

<h1 id="linux-step-by-step-ptt-interface-1">Linux Step-by-Step: PTT Interface</h1>
<h3 id="step-8--test-ptt-manually">Step 8 — Test PTT manually</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Key up the radio (assert RTS high)</span>
python3 -c <span class="hljs-string">&quot;
import serial, time
s = serial.Serial(&#x27;/dev/ttyUSB0&#x27;)
s.rts = True
print(&#x27;PTT ON — radio should be transmitting&#x27;)
time.sleep(3)
s.rts = False
print(&#x27;PTT OFF&#x27;)
s.close()
&quot;</span>
</code></pre>
<blockquote>
<p>Watch your radio's TX indicator. If it keys up, PTT is working.</p>
</blockquote>

<h1 id="linux-step-by-step-echolink-module-config">Linux Step-by-Step: EchoLink Module Config</h1>
<h3 id="step-10--edit-etcsvxlinksvxlinkdmoduleecholinkconf">Step 10 — Edit <code>/etc/svxlink/svxlink.d/ModuleEchoLink.conf</code></h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-ini"><span class="hljs-section">[ModuleEchoLink]</span>

<span class="hljs-comment"># EchoLink server</span>

<h1 id="linux-step-by-step-echolink-registration">Linux Step-by-Step: EchoLink Registration</h1>
<h3 id="before-svxlink-will-connect-you-must-validate-your-callsign">Before SVXLink will connect, you must validate your callsign</h3>
<h3 id="step-11--register-at-echolinkorg">Step 11 — Register at echolink.org</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>1. Go to:  https://www.echolink.org/validation/
2. Enter your callsign
3. Enter your name and email
4. EchoLink staff will verify against FCC/ITU database
   — takes 1-3 business days
5. You'll receive an email with your password
</code></pre>
<h3 id="step-12--set-your-password-in-the-config">Step 12 — Set your password in the config</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-built_in">sudo</span> nano /etc/svxlink/svxlink.d/ModuleEchoLink.conf
<span class="hljs-comment"># Set PASSWORD= to the password emailed to you</span>
</code></pre>
<blockquote>
<p><strong>Never share this password.</strong> It's tied to your callsign and license.</p>
</blockquote>

<h1 id="linux-step-by-step-port-forwarding">Linux Step-by-Step: Port Forwarding</h1>
<h3 id="step-13--forward-echolink-ports-on-your-router">Step 13 — Forward EchoLink ports on your router</h3>
<table>
<thead>
<tr>
<th>Protocol</th>
<th>Port</th>
<th>Direction</th>
<th>Purpose</th>
</tr>
</thead>
<tbody>
<tr>
<td>UDP</td>
<td>5198</td>
<td>In + Out</td>
<td>Voice audio</td>
</tr>
<tr>
<td>UDP</td>
<td>5199</td>
<td>In + Out</td>
<td>Text / status</td>
</tr>
<tr>
<td>TCP</td>
<td>5200</td>
<td>Outbound only</td>
<td>Directory server</td>
</tr>
</tbody>
</table>
<h3 id="on-openwrt-your-banana-pi">On OpenWrt (your Banana Pi):</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>LuCI → Network → Firewall → Port Forwards
→ Add rule:
    Name: EchoLink-UDP-5198
    Protocol: UDP
    External port: 5198
    Internal IP: [IP of your SVXLink machine]
    Internal port: 5198
→ Repeat for 5199
</code></pre>
<h3 id="or-via-command-line-on-openwrt">Or via command line on OpenWrt:</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">uci add firewall redirect
uci <span class="hljs-built_in">set</span> firewall.@redirect[-1].dest_port=<span class="hljs-string">&#x27;5198&#x27;</span>
uci <span class="hljs-built_in">set</span> firewall.@redirect[-1].proto=<span class="hljs-string">&#x27;udp&#x27;</span>
uci <span class="hljs-built_in">set</span> firewall.@redirect[-1].dest_ip=<span class="hljs-string">&#x27;192.168.1.100&#x27;</span>
uci commit firewall &amp;&amp; /etc/init.d/firewall restart
</code></pre>
</section>

<h1 id="linux-step-by-step-start-svxlink">Linux Step-by-Step: Start SVXLink</h1>
<h3 id="step-14--start-and-enable-svxlink">Step 14 — Start and enable SVXLink</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Start the service</span>
<span class="hljs-built_in">sudo</span> systemctl start svxlink

<span class="hljs-comment"># Enable on boot</span>
<span class="hljs-built_in">sudo</span> systemctl <span class="hljs-built_in">enable</span> svxlink

<span class="hljs-comment"># Check status</span>
<span class="hljs-built_in">sudo</span> systemctl status svxlink

<span class="hljs-comment"># Watch the log in real time</span>
<span class="hljs-built_in">sudo</span> journalctl -fu svxlink
</code></pre>
<h3 id="what-success-looks-like-in-the-log">What success looks like in the log</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>EchoLink: Logging in to server naeast.echolink.org...
EchoLink: Logged in as K0ABC-L (node #XXXXXX)
EchoLink: Ready to accept connections
</code></pre>
<blockquote>
<p>Write down your <strong>node number</strong> — that's what other hams will dial.</p>
</blockquote>

<h1 id="connecting-to-the-k0usa-94-net">Connecting to the K0USA .94 NET</h1>
<h3 id="how-to-connect-your-echolink-node-to-the-k0usa-repeater">How to connect your EchoLink node TO the K0USA repeater</h3>
<h3 id="option-a--they-connect-to-you">Option A — They connect to you</h3>
<ul>
<li>K0USA net control or a trustee keys your EchoLink node number</li>
<li>Their repeater controller connects to <code>K0ABC-L</code></li>
<li>All audio bridges between EchoLink and K0USA .94</li>
</ul>
<h3 id="option-b--your-node-connects-to-theirs">Option B — Your node connects to theirs</h3>
<p>In <code>ModuleEchoLink.conf</code>, or live via DTMF:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-ini"><span class="hljs-comment"># Auto-connect to K0USA EchoLink node on startup</span>
<span class="hljs-comment"># (get their node number from echolink.org/links)</span>
<span class="hljs-attr">AUTOCONNECT_ON_START</span>=K0USA-R
</code></pre>
<h3 id="joining-the-net-via-echolink-client-as-a-user">Joining the NET via EchoLink client (as a user)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>1. Open EchoLink app (iOS, Android, or desktop)
2. Search for:  K0ABC-L   (your link node)
3. Connect
4. You are now on the air on K0USA 147.940 MHz
5. Wait for net control, then key up and give your call
</code></pre>
</section>

<h1 id="participating-in-the-net--operating-procedure">Participating in the NET — Operating Procedure</h1>
<h3 id="before-the-net-starts">Before the NET starts</h3>
<ul>
<li><strong>Confirm the NET schedule</strong> — day/time/format (voice check-in, traffic, etc.)</li>
<li><strong>Confirm your audio levels</strong> — transmit a few seconds, listen back</li>
<li><strong>Announce your EchoLink node</strong> to the net control trustee in advance</li>
</ul>
<h3 id="during-the-net">During the NET</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Net Control: &quot;QRZ for check-ins...&quot;

You (via EchoLink):
  → Key up (push-to-talk on your client)
  → &quot;[Your callsign], checking in via EchoLink, 44Net node&quot;
  → Unkey

Net Control: &quot;K0ABC via EchoLink, copy 5/9, thank you&quot;
</code></pre>
<h3 id="good-echolink-operating-practice">Good EchoLink operating practice</h3>
<ul>
<li>Add <strong>0.5–1 second</strong> after keying before speaking (propagation delay)</li>
<li>Keep transmissions <strong>short</strong> — others may have high latency</li>
<li>Announce <strong>&quot;EchoLink&quot;</strong> when identifying so local ops know</li>
</ul>
</section>

<h1 id="windows-11-pro--alternative-path">Windows 11 Pro — Alternative Path</h1>
<h3 id="when-you-want-a-quick-setup-without-configuring-linux">When you want a quick setup without configuring Linux</h3>
<h3 id="step-1--download-echolink-for-windows">Step 1 — Download EchoLink for Windows</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>https://www.echolink.org/download.htm
→ Download EchoLink Setup (latest version)
→ Run the installer
</code></pre>
<h3 id="step-2--first-launch-validation">Step 2 — First launch validation</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>1. Enter your callsign → Next
2. EchoLink checks the FCC database automatically
3. If not found, click &quot;Request Validation&quot; → email process
4. Enter the password from your validation email
</code></pre>
<h3 id="step-3--configure-audio-device">Step 3 — Configure audio device</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>EchoLink → Tools → Setup → Audio tab
  Soundcard Input:  [Your USB audio adapter]
  Soundcard Output: [Your USB audio adapter]
  Test both with the built-in test tones
</code></pre>
</section>

<h1 id="windows-11-pro--ptt-and-radio-interface">Windows 11 Pro — PTT and Radio Interface</h1>
<h3 id="step-4--configure-ptt">Step 4 — Configure PTT</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>EchoLink → Tools → Setup → PTT tab
  PTT method: VOX  (easiest, no serial needed)
    OR
  PTT method: Serial Port
    Port: COM3  (check Device Manager for your USB-serial port)
    Signal: RTS
</code></pre>
<h3 id="step-5--sysop-mode-link-node">Step 5 — Sysop Mode (Link Node)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>EchoLink → Tools → Sysop Setup
  Node type: Link (-L)
  Callsign: K0ABC-L
  Password: [your EchoLink password]
  Location: Denver CO
  Enable &quot;Receive-only when not connected&quot;
</code></pre>
<h3 id="step-6--port-forwarding-on-your-windows-router">Step 6 — Port forwarding on your Windows router</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Router admin page → Port Forwarding:
  UDP 5198 → [Windows PC IP]
  UDP 5199 → [Windows PC IP]
  TCP 5200 → outbound (usually open by default)
</code></pre>

<h1 id="putting-it-all-together-on-the-banana-pi">Putting It All Together on the Banana Pi</h1>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># SSH into your Banana Pi (default: ssh root@192.168.1.1)</span>

<h1 id="banana-pi--44net-gateway--echolink-together">Banana Pi — 44Net Gateway + EchoLink Together</h1>
<h3 id="the-full-architecture-on-one-board">The full architecture on one board</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>[Internet WAN — 2.5 GbE port]
         │
         │  WireGuard tunnel to 44net.connect.cloud
         │  Your 44.x.x.x IP lives here
         │
[Banana Pi OpenWRT-One]
         │
         ├── WiFi AP — local ham shack network
         │
         ├── USB audio adapter ──► Radio audio I/O
         │
         ├── USB-serial adapter ──► Radio PTT
         │
         └── SVXLink process
               │  EchoLink module active
               └──► connects to K0USA .94 via EchoLink
</code></pre>
<h3 id="why-44net-on-the-same-box">Why 44Net on the same box?</h3>
<ul>
<li>Your SVXLink node gets a <strong>globally routable ham IP</strong></li>
<li>Other 44Net nodes can reach you directly (no NAT issues)</li>
<li>Useful for future AMPR services: Winlink, APRS, D-STAR gateways</li>
</ul>
</section>

<h1 id="banana-pi--openwrt-firewall-for-echolink">Banana Pi — OpenWrt Firewall for EchoLink</h1>
<h3 id="allowing-echolink-traffic-through-openwrts-firewall">Allowing EchoLink traffic through OpenWrt's firewall</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># SSH into Banana Pi</span>
<span class="hljs-comment"># Allow EchoLink UDP ports in from WAN</span>
uci batch &lt;&lt; <span class="hljs-string">&#x27;EOF&#x27;</span>
add firewall rule
<span class="hljs-built_in">set</span> firewall.@rule[-1].name=<span class="hljs-string">&#x27;EchoLink-5198&#x27;</span>
<span class="hljs-built_in">set</span> firewall.@rule[-1].src=<span class="hljs-string">&#x27;wan&#x27;</span>
<span class="hljs-built_in">set</span> firewall.@rule[-1].dest=<span class="hljs-string">&#x27;lan&#x27;</span>
<span class="hljs-built_in">set</span> firewall.@rule[-1].proto=<span class="hljs-string">&#x27;udp&#x27;</span>
<span class="hljs-built_in">set</span> firewall.@rule[-1].dest_port=<span class="hljs-string">&#x27;5198-5199&#x27;</span>
<span class="hljs-built_in">set</span> firewall.@rule[-1].target=<span class="hljs-string">&#x27;ACCEPT&#x27;</span>
EOF

uci commit firewall
/etc/init.d/firewall restart
</code></pre>
<h3 id="if-svxlink-runs-on-the-banana-pi-not-a-separate-machine">If SVXLink runs ON the Banana Pi (not a separate machine):</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Allow traffic destined for the router itself</span>
uci <span class="hljs-built_in">set</span> firewall.@rule[-1].dest=<span class="hljs-string">&#x27;*&#x27;</span>
uci <span class="hljs-built_in">set</span> firewall.@rule[-1].target=<span class="hljs-string">&#x27;ACCEPT&#x27;</span>
uci commit firewall &amp;&amp; /etc/init.d/firewall restart
</code></pre>
</section>

<h1 id="troubleshooting--common-issues">Troubleshooting — Common Issues</h1>
<table>
<thead>
<tr>
<th>Symptom</th>
<th>Likely cause</th>
<th>Fix</th>
</tr>
</thead>
<tbody>
<tr>
<td>SVXLink won't log in</td>
<td>Wrong password / callsign</td>
<td>Re-check <code>ModuleEchoLink.conf</code></td>
</tr>
<tr>
<td>&quot;Node not found&quot;</td>
<td>EchoLink not validated</td>
<td>Complete echolink.org validation</td>
</tr>
<tr>
<td>Audio one-way</td>
<td>Wrong ALSA device</td>
<td>Run <code>aplay/arecord -l</code>, fix <code>AUDIO_DEV=</code></td>
</tr>
<tr>
<td>Radio never keys</td>
<td>PTT pin wrong</td>
<td>Test PTT with Python script (slide 14)</td>
</tr>
<tr>
<td>Connections drop instantly</td>
<td>Ports not forwarded</td>
<td>Check UDP 5198/5199 with <code>nmap</code></td>
</tr>
<tr>
<td>High latency / choppy</td>
<td>ISP throttling UDP</td>
<td>Try different EchoLink server</td>
</tr>
<tr>
<td>44Net tunnel down</td>
<td>DNS not registered</td>
<td>Add DNS entry in AMPR portal</td>
</tr>
</tbody>
</table>
<h3 id="useful-diagnostic-commands">Useful diagnostic commands</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Test EchoLink port reachability from outside</span>
curl -s https://echolink.org/looptest.htm

<span class="hljs-comment"># Check which process owns port 5198</span>
ss -ulnp | grep 5198

<span class="hljs-comment"># SVXLink live log</span>
journalctl -fu svxlink --since <span class="hljs-string">&quot;5 min ago&quot;</span>
</code></pre>
</section>

<h1 id="security-considerations">Security Considerations</h1>
<h3 id="running-a-ham-radio-node-on-the-internet">Running a ham radio node on the internet</h3>
<ul>
<li><strong>EchoLink validates licenses</strong> — only hams can connect</li>
<li>Use <strong>CALLSIGN_ACL</strong> in ModuleEchoLink.conf to restrict to known calls</li>
<li>The <code>44.0.0.0/8</code> space is <strong>not encrypted by default</strong> — don't pass sensitive data</li>
<li>Keep your Banana Pi <strong>updated</strong>: <code>opkg update &amp;&amp; opkg upgrade</code></li>
<li>Use <strong>WPA3</strong> on the Banana Pi's WiFi AP</li>
<li>Consider <strong>fail2ban</strong> if running SSH on a public IP</li>
<li><strong>Never share your EchoLink password</strong> — it's your license identity</li>
</ul>
<h3 id="regulatory-reminders">Regulatory reminders</h3>
<ul>
<li><strong>No encryption</strong> of voice content on amateur frequencies</li>
<li><strong>No third-party traffic</strong> for hire</li>
<li><strong>Identify every 10 minutes</strong> and at end of transmission (FCC Part 97)</li>
<li>SVXLink handles automatic ID for you if configured correctly</li>
</ul>
</section>
